name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本，例如 1.0.0
        required: true
        default: 1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 构建发布包
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 计算版本号
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "版本号必须使用 major.minor.patch 格式：$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "assemblyVersion=$version.0" >> $env:GITHUB_OUTPUT

      - name: 还原依赖
        run: dotnet restore VeloPic.sln

      - name: 运行核心测试
        run: dotnet run --project tests\VeloPic.Core.Tests\VeloPic.Core.Tests.csproj --configuration Release --no-restore

      - name: 发布 win-x64 便携版
        run: >
          dotnet publish src\VeloPic.App\VeloPic.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts\publish
          -p:Platform=x64
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assemblyVersion }}
          -p:FileVersion=${{ steps.version.outputs.assemblyVersion }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: 打包便携 ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts\release -Force | Out-Null
          $zip = "artifacts\release\VeloPic-v${{ steps.version.outputs.version }}-win-x64-portable.zip"
          Compress-Archive -Path artifacts\publish\* -DestinationPath $zip -Force

      - name: 准备 MSIX 签名证书
        shell: pwsh
        run: |
          $password = [Guid]::NewGuid().ToString("N") + "Aa1!"
          $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=VeloPic" `
            -FriendlyName "VeloPic Release Signing" `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -NotAfter (Get-Date).AddYears(5) `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")

          $pfxPath = "artifacts\VeloPic-ReleaseSigning.pfx"
          $cerPath = "artifacts\release\VeloPic-v${{ steps.version.outputs.version }}-CodeSigning.cer"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $securePassword | Out-Null
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          "::add-mask::$password"
          "SIGN_CERT_PATH=$pfxPath" >> $env:GITHUB_ENV
          "SIGN_CERT_PUBLIC_PATH=$cerPath" >> $env:GITHUB_ENV
          "SIGN_CERT_PASSWORD=$password" >> $env:GITHUB_ENV
          "SIGN_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: 打包并签名 MSIX
        shell: pwsh
        run: |
          .\scripts\package-msix.ps1 `
            -PublishDir artifacts\publish `
            -OutputPath "artifacts\release\VeloPic-v${{ steps.version.outputs.version }}-win-x64.msix" `
            -Version "${{ steps.version.outputs.assemblyVersion }}" `
            -SignCertificatePath $env:SIGN_CERT_PATH `
            -SignCertificatePassword $env:SIGN_CERT_PASSWORD

      - name: 验证 MSIX 签名
        shell: pwsh
        run: |
          $msixPath = "artifacts\release\VeloPic-v${{ steps.version.outputs.version }}-win-x64.msix"
          $signature = Get-AuthenticodeSignature -FilePath $msixPath
          $expectedCertificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($env:SIGN_CERT_PUBLIC_PATH)

          if ($null -eq $signature.SignerCertificate) {
            throw "MSIX 不包含 Authenticode 签名。"
          }
          if ($signature.SignerCertificate.Thumbprint -ne $expectedCertificate.Thumbprint) {
            throw "MSIX 签名者与公开证书不一致。"
          }
          if ($signature.SignatureType -ne "Authenticode") {
            throw "MSIX 签名类型无效：$($signature.SignatureType)"
          }
          if ($signature.Status -notin @("Valid", "UnknownError")) {
            throw "MSIX 签名完整性验证失败：$($signature.Status) $($signature.StatusMessage)"
          }

      - name: 清理签名私钥
        if: always()
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:SIGN_CERT_THUMBPRINT)) {
            Remove-Item "Cert:\CurrentUser\My\$env:SIGN_CERT_THUMBPRINT" -Force -ErrorAction SilentlyContinue
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SIGN_CERT_PATH)) {
            Remove-Item $env:SIGN_CERT_PATH -Force -ErrorAction SilentlyContinue
          }

      - name: 生成 SHA256 校验文件
        shell: pwsh
        run: |
          $lines = Get-ChildItem artifacts\release -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          $lines | Set-Content artifacts\release\SHA256SUMS.txt -Encoding UTF8

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: VeloPic-v${{ steps.version.outputs.version }}-win-x64
          path: artifacts/release/*

      - name: 发布 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VeloPic v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## 安装方式

            **MSIX 安装包**

            1. 下载 `CodeSigning.cer` 和 `.msix` 文件。
            2. 双击 `.cer`，将证书安装到“本地计算机”的“受信任人”证书存储。
            3. 双击 `.msix` 完成安装。

            **便携版**

            下载 `portable.zip`，解压后运行 `VeloPic.App.exe`，无需安装。

            GitHub 会在 Release 附件末尾自动提供 Source code（zip）和 Source code（tar.gz）。
          files: artifacts/release/*
